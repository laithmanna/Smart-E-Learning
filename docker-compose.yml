services:
  postgres:
    image: postgres:16-alpine
    container_name: sel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sel_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-smart_elearning}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sel} -d ${POSTGRES_DB:-smart_elearning}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sel_pgdata:
